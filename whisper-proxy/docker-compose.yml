services:
  # NVIDIA Parakeet TDT 0.6B V3 - Multilingual ASR (25 langues dont français)
  # API compatible OpenAI - meilleur que Whisper Large V3, 30x temps réel sur CPU
  parakeet:
    build:
      context: .
      dockerfile: Dockerfile.parakeet
    container_name: neo-parakeet
    # PAS de ports exposés - accessible uniquement via le proxy
    volumes:
      - parakeet_models:/root/.cache/huggingface
    restart: unless-stopped

  whisper-proxy:
    image: nginx:alpine
    container_name: neo-whisper-proxy
    ports:
      - "8000:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - parakeet
    restart: unless-stopped

volumes:
  parakeet_models:
