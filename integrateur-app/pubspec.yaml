name: neo_integrateur
description: "Neo Intégrateur - Application tablette pour les intégrateurs domotique terrain"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.8.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Code generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utils
  equatable: ^2.0.7
  uuid: ^4.5.1
  connectivity_plus: ^6.1.3
  intl: ^0.20.2

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # PDF
  pdf: ^3.11.2
  printing: ^5.14.0

  # UI helpers
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  hive_generator: ^2.0.1
  riverpod_generator: ^2.6.5

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
